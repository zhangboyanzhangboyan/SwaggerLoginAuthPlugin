<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swagger 登录</title>
    <style>
        /* 简约风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            background: #fff;
            padding: 40px 36px;
            border-radius: 4px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.1);
            width: 340px;
            max-width: 90%;
        }

        h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 28px;
            text-align: center;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 18px;
        }

            .input-group label {
                display: block;
                margin-bottom: 6px;
                color: #555;
                font-size: 13px;
            }

            .input-group input {
                width: 100%;
                padding: 10px 12px;
                border: 1px solid #d9d9d9;
                border-radius: 4px;
                font-size: 14px;
                transition: border-color 0.2s;
                outline: none;
            }

                .input-group input:focus {
                    border-color: #4096ff;
                }

        button {
            width: 100%;
            padding: 10px 0;
            background: #1677ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
            position: relative;
        }

            button:hover {
                background: #4096ff;
            }

            button:disabled {
                background: #91caff;
                cursor: not-allowed;
            }

        .message {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            display: none;
        }

            .message.error {
                color: #ff4d4f;
            }

            .message.success {
                color: #52c41a;
            }
        /* 淡出动画 */
        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .fade-out {
            animation: fadeOut 0.6s ease forwards;
        }
    </style>
</head>
<body>
    <div class="login-box" id="loginBox">
        <h2>Swagger API 文档</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required>
            </div>
            <div class="input-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" id="submitBtn">登 录</button>
            <div class="message" id="messageBox"></div>
        </form>
    </div>

    <script>
        /* eslint-disable */
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');
        const loginBox = document.getElementById('loginBox');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // 禁用按钮并显示加载状态
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中…';
            messageBox.style.display = 'none';
            messageBox.className = 'message';

            try {
                // 获取表单数据
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                const response = await fetch('/swagger/submit-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // 显示成功消息
                    messageBox.textContent = result.message || '登录成功，正在跳转…';
                    messageBox.className = 'message success';
                    messageBox.style.display = 'block';

                    // 登录成功后添加淡出动画，再跳转
                    loginBox.classList.add('fade-out');
                    setTimeout(() => { window.location.href = '/swagger'; }, 700);
                } else {
                    // 显示错误消息
                    messageBox.textContent = result.message || '用户名或密码错误';
                    messageBox.className = 'message error';
                    messageBox.style.display = 'block';
                }
            } catch (error) {
                messageBox.textContent = '网络错误，请稍后再试';
                messageBox.className = 'message error';
                messageBox.style.display = 'block';
            } finally {
                // 恢复按钮状态（仅在出错或异常时，成功页即将跳转无需恢复）
                if (!loginBox.classList.contains('fade-out')) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登 录';
                }
            }
        });
    </script>
</body>
</html>
